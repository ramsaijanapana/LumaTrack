services:
  - type: web
    name: lumatrack-web
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --config gunicorn.conf.py server:app
    healthCheckPath: /api/bootstrap
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lumatrack-db
          property: connectionString
      - key: LUMATRACK_SECRET_KEY
        generateValue: true
      - key: LUMATRACK_TRUST_PROXY
        value: "true"
      - key: LUMATRACK_MIN_PASSWORD_LENGTH
        value: "12"
      - key: LUMATRACK_MAX_CONTENT_LENGTH
        value: "1048576"

databases:
  - name: lumatrack-db
    plan: free
    region: oregon
    databaseName: lumatrack
    user: lumatrack
