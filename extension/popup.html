<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchnest Companion</title>
  <link rel="stylesheet" href="./popup.css">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <h1>Watchnest Companion</h1>
      <p>Capture the current OTT tab and send it into your library.</p>
    </header>

    <form id="settings-form" class="panel">
      <h2>Connection</h2>
      <label>
        <span>App URL</span>
        <input id="base-url" type="url" placeholder="http://127.0.0.1:5000" required>
      </label>
      <label>
        <span>Companion token</span>
        <textarea id="token" rows="3" placeholder="Paste the token created in Watchnest" required></textarea>
      </label>
      <button type="submit">Save connection</button>
    </form>

    <section class="panel">
      <div class="panel-head">
        <h2>Detected tab</h2>
        <button id="refresh-tab" type="button" class="ghost">Refresh</button>
      </div>
      <div id="tab-summary" class="summary">No tab detected yet.</div>
    </section>

    <form id="capture-form" class="panel">
      <h2>Observation</h2>
      <label>
        <span>Title</span>
        <input id="title" type="text" required>
      </label>
      <div class="two-up">
        <label>
          <span>Type</span>
          <select id="kind">
            <option value="show">Show</option>
            <option value="movie">Movie</option>
          </select>
        </label>
        <label>
          <span>Platform</span>
          <select id="platform">
            <option value="netflix">Netflix</option>
            <option value="prime-video">Prime Video</option>
            <option value="disney-plus">Disney+</option>
            <option value="max">Max</option>
            <option value="apple-tv">Apple TV+</option>
            <option value="plex">Plex / Jellyfin</option>
          </select>
        </label>
      </div>
      <div class="two-up">
        <label>
          <span>Current unit</span>
          <input id="current-unit" type="text" placeholder="S1 E1 or Movie">
        </label>
        <label>
          <span>Device</span>
          <input id="device" type="text" value="Browser extension">
        </label>
      </div>
      <div class="two-up">
        <label>
          <span>Duration (min)</span>
          <input id="duration" type="number" min="1" value="42">
        </label>
        <label>
          <span>Progress delta</span>
          <input id="progress-delta" type="number" min="1" max="100" value="16">
        </label>
      </div>
      <label>
        <span>Summary</span>
        <textarea id="summary" rows="3" placeholder="Optional note to save with the title"></textarea>
      </label>
      <button type="submit">Send observation</button>
    </form>

    <div id="status" class="status"></div>
  </main>
  <script src="./popup.js"></script>
</body>
</html>
